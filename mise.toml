#:schema https://mise.en.dev/schema/mise.json

experimental_monorepo_root = true

[deps.npm]
auto = true

[monorepo]
config_roots = [
  "./machines/*",
  "./services/*"
]

[tools]
"aqua:koalaman/shellcheck" = "latest"
"aqua:opentofu/opentofu" = "latest"
"core:node" = "lts"
"github:jdx/fnox" = "latest"
